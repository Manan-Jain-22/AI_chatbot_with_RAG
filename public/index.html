<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Computational Linear Algebra RAG Assistant</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d667a;
        --border: #d9deea;
        --accent: #1457d9;
        --accent-dark: #0f3f9e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 40px auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
      }

      label {
        display: block;
        font-weight: 650;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        font: inherit;
        color: var(--text);
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        margin-bottom: 16px;
        font-size: 14px;
        color: var(--muted);
      }

      .answer {
        margin-top: 18px;
        white-space: pre-wrap;
      }

      .sources {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .error {
        color: #a10000;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Computational Linear Algebra RAG Assistant</h1>
        <p>
          Hosted demo surface for the LangGraph + FAISS study assistant. The
          complete Streamlit application handles document upload, indexing,
          answer review, and MCP export.
        </p>
      </header>

      <section class="panel">
        <div id="status" class="status">Checking API health...</div>
        <label for="question">Ask a course question</label>
        <textarea id="question" placeholder="Example: How do I solve an overdetermined system?"></textarea>
        <button id="askButton" type="button">Ask</button>
        <div id="answer" class="answer"></div>
        <div id="sources" class="sources"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const answerEl = document.getElementById("answer");
      const sourcesEl = document.getElementById("sources");
      const button = document.getElementById("askButton");
      const questionEl = document.getElementById("question");

      async function checkHealth() {
        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          statusEl.textContent = data.index_ready
            ? `API ready. Index: ${data.index_dir}`
            : "API running, but FAISS index is not deployed yet.";
        } catch (error) {
          statusEl.textContent = "API health check failed.";
          statusEl.classList.add("error");
        }
      }

      async function askQuestion() {
        const question = questionEl.value.trim();
        if (!question) {
          answerEl.textContent = "Enter a question first.";
          answerEl.classList.add("error");
          return;
        }

        button.disabled = true;
        answerEl.classList.remove("error");
        answerEl.textContent = "Retrieving course context...";
        sourcesEl.textContent = "";

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Request failed.");
          }

          answerEl.textContent = data.answer;
          sourcesEl.textContent = data.sources?.length
            ? `Sources: ${data.sources.join(", ")}`
            : "";
        } catch (error) {
          answerEl.classList.add("error");
          answerEl.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      }

      button.addEventListener("click", askQuestion);
      questionEl.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          askQuestion();
        }
      });

      checkHealth();
    </script>
  </body>
</html>
